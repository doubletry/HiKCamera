name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # needed for PyPI trusted publishing

jobs:
  # -------------------------------------------------------------------------
  # 1. Build the distribution packages
  # -------------------------------------------------------------------------
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can read the tag

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip and install build tools
        run: pip install --upgrade pip build

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # Update the version in pyproject.toml directly with Python so we don't
      # need a Poetry installation just for `poetry version`.
      - name: Set package version to tag
        run: |
          python3 - << 'PYEOF'
          import re, pathlib, os
          version = os.environ["VERSION"]
          p = pathlib.Path("pyproject.toml")
          content = p.read_text(encoding="utf-8")
          content = re.sub(r'^(version\s*=\s*")[^"]*(")', rf'\g<1>{version}\2', content, flags=re.M)
          p.write_text(content, encoding="utf-8")
          print(f"Version set to {version}")
          PYEOF
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Install package with dev dependencies (for tests)
        run: pip install -e ".[dev]"

      - name: Run tests before building
        run: pytest tests/ -q

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload dist artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # 2. Create a GitHub Release and attach the distribution files
  # -------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dist artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "HiKCamera ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*

  # -------------------------------------------------------------------------
  # 3. Publish to PyPI using trusted publishing (no API token required)
  # -------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hikcamera/

    steps:
      - name: Download dist artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted publishing: no API token needed when the environment
          # is configured correctly in PyPI project settings.
          skip-existing: true
