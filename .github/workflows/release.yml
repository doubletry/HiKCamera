name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # needed for PyPI trusted publishing

jobs:
  # -------------------------------------------------------------------------
  # 1. Build the distribution packages
  # -------------------------------------------------------------------------
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so poetry can read the tag

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set package version to tag
        run: poetry version "${{ steps.get_version.outputs.VERSION }}"

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run tests before building
        run: poetry run pytest tests/ -q

      - name: Build wheel and sdist
        run: poetry build

      - name: Upload dist artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # 2. Create a GitHub Release and attach the distribution files
  # -------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dist artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "HiKCamera ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*

  # -------------------------------------------------------------------------
  # 3. Publish to PyPI using trusted publishing (no API token required)
  # -------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hikcamera/

    steps:
      - name: Download dist artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted publishing: no API token needed when the environment
          # is configured correctly in PyPI project settings.
          skip-existing: true
