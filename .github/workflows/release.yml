name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # needed for PyPI trusted publishing

jobs:
  # -------------------------------------------------------------------------
  # 1. Build the distribution packages
  # -------------------------------------------------------------------------
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can read the tag

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install Poetry via pip: on Ubuntu this places `poetry` in the Python
      # environment's bin directory which actions/setup-python already adds to
      # PATH, so no additional PATH configuration is needed.
      - name: Install Poetry
        run: pip install --upgrade pip poetry

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # Bump the version in pyproject.toml to match the pushed tag.
      - name: Set package version to tag
        run: poetry version "${{ steps.get_version.outputs.VERSION }}"

      # Install the package and dev extras via pip so pytest is available.
      # Disable Poetry's virtualenv so packages install into the active env.
      - name: Install package with dev dependencies (for tests)
        run: |
          poetry config virtualenvs.create false
          pip install -e ".[dev]"

      - name: Run tests before building
        run: pytest tests/ -q

      # Use `poetry build` to produce the wheel and sdist, consistent with
      # the project's Poetry-based packaging setup.
      - name: Build wheel and sdist
        run: poetry build

      # -------------------------------------------------------
      # Smoke-test: install the built wheel and verify it works
      # -------------------------------------------------------
      - name: Verify built wheel (import check + demo --help)
        run: |
          # Uninstall the editable install used for testing above so the
          # following steps exercise the freshly-built wheel only.
          pip uninstall hikcamera -y

          # Install the wheel produced by `poetry build`.
          pip install dist/*.whl

          # 1. Confirm the package is importable and exposes __version__.
          python -c "import hikcamera; print('hikcamera', hikcamera.__version__, 'imported OK')"

          # 2. Run each demo with --help.  argparse exits 0 after printing
          #    help text, which exercises all top-level imports (hikcamera,
          #    numpy, cv2) without requiring a camera or the MVS SDK.
          python demos/save_image.py --help
          python demos/save_video.py --help

      - name: Upload dist artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # 2. Create a GitHub Release and attach the distribution files
  # -------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download dist artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "HiKCamera ${{ github.ref_name }}"
          generate_release_notes: true
          files: dist/*

  # -------------------------------------------------------------------------
  # 3. Publish to PyPI using trusted publishing (no API token required)
  # -------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/hikcamera/

    steps:
      - name: Download dist artefacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted publishing: no API token needed when the environment
          # is configured correctly in PyPI project settings.
          skip-existing: true
